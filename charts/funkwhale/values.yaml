# Default values for funkwhale.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.
---
image:
  registry: docker.io/funkwhale
  # tag:
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

replicaCount: 1

## Django secret to use for encoding cookies/macaroons
djangoSecret:

## Additional environment variables to set
extraEnv: {}
  # LDAP_ENABLED: "True"
  # LDAP_ROOT_DN: dc=example,dc=com
  # LDAP_SEARCH_FILTER: (|(uid={0})(mail={0}))
  # LDAP_SERVER_URI: ldaps://ldap.example.com
  # LDAP_START_TLS: "True"
  # MEDIA_ROOT: /srv/funkwhale/data/media

## Additional complex environment variables to set
extraEnvVars: []
# - name: LDAP_BIND_DN
#   valueFrom:
#     secretKeyRef:
#       name: ldap-keys
#       key: BIND_DN

## Additional ConfigMap/Secret objects to ingress as environment variables
extraEnvFrom: []
# - configMapRef:
#     name: configmap
# - secretRef:
#     name: secret

## Additional secret environment variables to set
extraSecret: {}
  # EMAIL_CONFIG: smtp://
  # DEFAULT_FROM_EMAIL: funkwhale@example.com

## PVC-based data storage configuration
persistence:
  enabled: false
  # existingClaim: netbox-data
  # storageClass: "-"

  ## Note; Using ReadWriteOnce for persistence will require the addition of
  ## a required affinity for the celery worker, as well as the use of only a
  ## single api replica.
  ##
  ## An example is provided for the worker affinity
  accessMode: ReadWriteMany
  size: 1Gi

## S3-based data storage configuration
s3:
  enabled: false
  proxy: true

  accessKey:
  secretKey:

  ## Existing secret containing the S3 secret key
  existingSecret:
  existingSecretKey: s3-secret-key

  bucket: funkwhale
  # region: eu-west-2
  # location: /funkwhale
  # url: http://s3.example.com


## Import music into Funkwhale
## https://docs.funkwhale.audio/administrator/import.html
import: []
#  # Import data into a library with job/cronjob
#  - library: 769a2bc3
#    # cron: 0 * * * *
#    volume:
#      persistentVolumeClaim:
#        claimName: music
#    subPath: import-folder # Use a subPath mount
#  # Import data into a library with a live watch
#  - library: 769a2bc3
#    watch: true
#    # Use in-place import, requires the volume to be mounted in the api, front, and worker pods as well,
#    # with the mount path "/srv/funkwhale/data/music/<name | library>"
#    inPlace: true
#    prune: true # Prune removed tracks from funkwhale library
#    name: music-archive # directory name, will default to library ID if not specified
#    volume:
#      nfs:
#        server: jukebox.internal
#        path: /exports/music

## API server configuration
api:
  image:
    # registry:
    image: api
    # tag:
    # pullPolicy:

  ## Additional mounts to add to the API container
  ## If using an external media mount it needs to be attached to both API and Front
  extraVolumeMounts: []
    # - name: extra-music-data
    #   mountPath: /srv/funkwhale/data/music
    #   readOnly: true

  ## Additional volumes to add to the API container
  extraVolumes: []
    # - name: extra-music-data
    #   persistentVolumeClaim:
    #     claimName: volume-claim

  resources: {}
    # limits:
    #   cpu: 100m
    #   memory: 128Mi
    # requests:
    #   cpu: 100m
    #   memory: 128Mi

  nodeSelector: {}

  tolerations: []

  affinity: {}

  readinessProbe:
    httpGet:
      path: /
      port: api
      scheme: HTTP

  livenessProbe:
    httpGet:
      path: /
      port: api
      scheme: HTTP

  startupProbe:
    tcpSocket:
      port: api

## Web frontend and proxy
front:
  image:
    # registry:
    image: front
    # tag:
    # pullPolicy:

  ## Additional mounts to add to the frontend container
  extraVolumeMounts: []
    # - name: extra-music-data
    #   mountPath: /srv/funkwhale/data/music
    #   readOnly: true

  ## Additional volumes to add to the frontend container
  extraVolumes: []
    # - name: extra-music-data
    #   persistentVolumeClaim:
    #     claimName: volume-claim

  resources: {}
    # limits:
    #   cpu: 100m
    #   memory: 128Mi
    # requests:
    #   cpu: 100m
    #   memory: 128Mi

  nodeSelector: {}
  tolerations: []
  affinity: {}

  readinessProbe:
    httpGet:
      path: /
      port: http
      scheme: HTTP

  livenessProbe:
    httpGet:
      path: /
      port: http
      scheme: HTTP

  startupProbe:
    tcpSocket:
      port: http

celery:
  image:
    # registry:
    image: api
    # tag:
    # pullPolicy:

  beat:
    logLevel: info

    resources: {}
    #  limits:
    #    cpu: 150m
    #    memory: 256Mi
    #  requests:
    #    cpu: 10m
    #    memory: 75Mi

    nodeSelector: {}

    tolerations: []

    affinity: {}

  worker:
    replicaCount: 1

    logLevel: info

    # Additional mounts to add to the worker pod
    extraVolumeMounts: []
      # - name: extra-music-data
      #   mountPath: /srv/funkwhale/data/music
      #   readOnly: true

    extraVolumes: []
      # - name: extra-music-data
      #   persistentVolumeClaim:
      #     claimName: volume-claim

    resources: {}
      # limits:
      #   cpu: 100m
      #   memory: 128Mi
      # requests:
      #   cpu: 100m
      #   memory: 128Mi

    nodeSelector: {}

    tolerations: []

    # Example provided for always co-locating with the main application, for
    # use with ReadWriteOnce volumes.
    affinity: {}
      # requiredDuringSchedulingIgnoredDuringExecution:
      # - labelSelector:
      #     matchExpressions:
      #     - key: audio.funkwhale/component
      #       operator: In
      #       values:
      #       - app

## Migration job
migrate:
  enable: true
  image:
    # registry:
    image: api
    # tag:
    # pullPolicy:

  ## Additional mounts to add to the API container
  ## If using an external media mount it needs to be attached to both API and Front
  extraVolumeMounts: []
    # - name: extra-music-data
    #   mountPath: /srv/funkwhale/data/music
    #   readOnly: true

  ## Additional volumes to add to the API container
  extraVolumes: []
    # - name: extra-music-data
    #   persistentVolumeClaim:
    #     claimName: volume-claim

  resources: {}
    # limits:
    #   cpu: 100m
    #   memory: 128Mi
    # requests:
    #   cpu: 100m
    #   memory: 128Mi

  nodeSelector: {}

  tolerations: []

  affinity: {}

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: false
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: 500m
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  labels: {}
    # app: funkwhale
  host: chart-example.local
  protocol: http

  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

  ## Set the name of the IngressClass cluster resource (optional)
  ## https://kubernetes.io/docs/reference/kubernetes-api/service-resources/ingress-v1/#IngressSpec
  # className: can-be-anything

postgresql:
  ## External Postgresql hostname or IP
  host:
  # port: 5432

  ## Database user
  username: funkwhale

  ## Database password
  password: funkwhale

  ## Database password
  database: funkwhale

  ## Existing secret for connection URI
  ## Should be in the format postgres://username:password@host:port/database
  # existingSecret:
  # existingSecretKey: postgresql-url

redis:
  ## External Redis hostname or IP
  host:

  ## The redis database ID that funkwhale should use, defaults to 0
  # database: 0
  # port: 6379
  password: funkwhale

  ## Existing secret for connection URI
  ## Should be in the format redis://:password@host:port/database
  # existingSecret:
  # existinVgSecretKey: redis-url
