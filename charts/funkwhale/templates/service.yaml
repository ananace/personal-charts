apiVersion: v1
kind: Service
metadata:
  name: {{ include "funkwhale.fullname" . }}
  labels:
    {{- include "funkwhale.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "funkwhale.selectorLabels" . | nindent 4 }}
    audio.funkwhale/component: app
